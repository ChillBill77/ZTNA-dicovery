name: ztna

networks:
  backend:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks: [backend]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: ./migrate
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks: [backend]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys;sys.exit(0 if urllib.request.urlopen(\"http://localhost:8000/health/live\").status==200 else 1)'"]
      interval: 10s
      timeout: 3s
      retries: 5
    labels:
      - traefik.enable=true
      - traefik.docker.network=backend
      - traefik.http.routers.api.rule=Host(`${APP_DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/ws`) || PathPrefix(`/health`))
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls=true
      # NOTE: no certresolver by default — Traefik serves its built-in self-signed cert.
      # docker-compose.prod.yml overlays a Let's Encrypt resolver via labels + static config.
      - traefik.http.routers.api.middlewares=rate-limit@file,secure-headers@file,compression@file
      - traefik.http.services.api.loadbalancer.server.port=8000

  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
      - "514:514/udp"
      - "514:514/tcp"
      - "516:516/udp"
      - "516:516/tcp"
      - "517:517/udp"
      - "517:517/tcp"
      - "518:518/udp"
      - "518:518/tcp"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/certs:/certs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [backend]
    depends_on:
      api:
        condition: service_started    # edge router must not block on backend health

  flow-ingest:
    build:
      context: .
      dockerfile: flow-ingest/Dockerfile
    env_file: .env
    environment:
      SYSLOG_HOST: 0.0.0.0
      SYSLOG_PORT: 5514
      CONFIG_DIR: /etc/flowvis/adapters
    volumes:
      - ./config/adapters:/etc/flowvis/adapters:ro
    depends_on:
      redis:
        condition: service_healthy
    networks: [backend]
    expose:
      - "5514/udp"
      - "5514/tcp"
    restart: unless-stopped

  id-ingest:
    build:
      context: .
      dockerfile: id-ingest/Dockerfile
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./id-ingest/configs:/etc/flowvis/adapters:ro
    networks: [backend]
    expose:
      - "5516/udp"
      - "5516/tcp"
      - "5517/udp"
      - "5517/tcp"
      - "5518/udp"
      - "5518/tcp"
    restart: unless-stopped

  resolver:
    build:
      context: .
      dockerfile: resolver/Dockerfile
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks: [backend]
    restart: unless-stopped

  correlator:
    build:
      context: .
      dockerfile: correlator/Dockerfile
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      flow-ingest:
        condition: service_started
    networks: [backend]
    restart: unless-stopped

  backup:
    build: ./backup
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backups:/backups
    networks: [backend]
    restart: unless-stopped
