name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install tools
        run: pip install ruff mypy
      - name: Install common (shared package — must come first)
        run: pip install -e 'common/[test]'
      - name: Install api with test extras (pulls pytest + pytest-asyncio + httpx)
        run: pip install -e 'api/[test]'
      - name: Install flow-ingest with test extras
        run: pip install -e 'flow-ingest/[test]'
      - name: Install id-ingest with test extras
        run: pip install -e 'id-ingest/[test]'
      - name: Install resolver with test extras
        run: pip install -e 'resolver/[test]'
      - name: Install correlator with test extras
        run: pip install -e 'correlator/[test]'
      - name: Install migrate deps
        run: pip install -r migrate/requirements.txt
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Mypy
        run: mypy api/src migrate/alembic common/src flow-ingest/src id-ingest/src resolver/src correlator/src
      - name: Pytest (unit)
        run: pytest common/tests api/tests flow-ingest/tests id-ingest/tests resolver/tests correlator/tests -v

  no-claude-attribution:
    # Per project policy: commit messages on this repo must not contain Claude
    # attribution trailers. Fail the job if any commit in the PR range does.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check commit messages for forbidden trailers
        run: |
          range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          if [ -z "${{ github.event.pull_request.base.sha }}" ]; then
            range="HEAD~20..HEAD"   # push to main: inspect last 20
          fi
          if git log --format='%B' "$range" | grep -iE 'Co-Authored-By:.*Claude|Generated with.*Claude Code'; then
            echo "::error::Forbidden Claude attribution found in commit messages."
            exit 1
          fi

  migration-roundtrip:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_USER: ci
          POSTGRES_DB: ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r migrate/requirements.txt
      - name: alembic upgrade head
        env:
          DATABASE_URL: postgresql+psycopg://ci:ci@localhost:5432/ci
        working-directory: migrate
        run: alembic upgrade head
      - name: alembic downgrade base
        env:
          DATABASE_URL: postgresql+psycopg://ci:ci@localhost:5432/ci
        working-directory: migrate
        run: alembic downgrade base
      - name: alembic upgrade head (idempotent re-run)
        env:
          DATABASE_URL: postgresql+psycopg://ci:ci@localhost:5432/ci
        working-directory: migrate
        run: alembic upgrade head

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Vitest
        run: npx vitest run

  python-integration:
    runs-on: ubuntu-latest
    needs: [python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Seed .env for compose (env_file reference)
        run: |
          cp .env.example .env
          # Overwrite values that must match the step env (postgres uses env_file
          # on every service; step env only wins for services with an explicit
          # `environment:` override). Keeping .env consistent avoids auth drift.
          sed -i 's|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=integration|' .env
          sed -i 's|^DATABASE_URL=.*|DATABASE_URL=postgresql+asyncpg://ztna:integration@postgres:5432/ztna|' .env
          sed -i 's|^APP_DOMAIN=.*|APP_DOMAIN=localhost|' .env
          sed -i 's|^ACME_EMAIL=.*|ACME_EMAIL=|' .env
      - name: Build and start stack
        env:
          APP_DOMAIN: localhost
          POSTGRES_USER: ztna
          POSTGRES_PASSWORD: integration
          POSTGRES_DB: ztna
          DATABASE_URL: postgresql+asyncpg://ztna:integration@postgres:5432/ztna
          REDIS_URL: redis://redis:6379/0
          ACME_EMAIL: ""
        run: docker compose -f docker-compose.yml -f compose.test.yml up -d --build
      - name: Wait for api /health/ready
        run: |
          for i in $(seq 1 60); do
            if curl -fs http://localhost:8000/health/ready; then break; fi
            sleep 2
          done
      - name: Install test deps
        run: pip install -e 'api/[test]' websockets==13.1
      - name: Run integration tests
        run: pytest tests/integration -v -m integration
      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f compose.test.yml logs --tail=200
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f compose.test.yml down -v --remove-orphans

  playwright-smoke:
    runs-on: ubuntu-latest
    needs: [python, web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          # No cache: e2e/package-lock.json is not committed; npm install in the
          # install step generates it fresh. Caching against a missing file
          # fails the setup-node step in strict mode.
      - name: Seed .env for compose (env_file reference)
        run: |
          cp .env.example .env
          # Overwrite values that must match the step env (postgres uses env_file
          # on every service; step env only wins for services with an explicit
          # `environment:` override). Keeping .env consistent avoids auth drift.
          sed -i 's|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=integration|' .env
          sed -i 's|^DATABASE_URL=.*|DATABASE_URL=postgresql+asyncpg://ztna:integration@postgres:5432/ztna|' .env
          sed -i 's|^APP_DOMAIN=.*|APP_DOMAIN=localhost|' .env
          sed -i 's|^ACME_EMAIL=.*|ACME_EMAIL=|' .env
      - name: Build and start stack
        env:
          APP_DOMAIN: localhost
          POSTGRES_USER: ztna
          POSTGRES_PASSWORD: integration
          POSTGRES_DB: ztna
          DATABASE_URL: postgresql+asyncpg://ztna:integration@postgres:5432/ztna
          REDIS_URL: redis://redis:6379/0
          ACME_EMAIL: ""
        run: docker compose -f docker-compose.yml -f compose.test.yml up -d --build
      - name: Wait for api /health/ready
        run: |
          for i in $(seq 1 60); do
            if curl -fs http://localhost:8000/health/ready; then break; fi
            sleep 2
          done
      - name: Install e2e deps + browser
        working-directory: e2e
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Run Playwright
        working-directory: e2e
        env:
          E2E_BASE_URL: http://localhost:8000
        run: npx playwright test
      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f compose.test.yml logs --tail=200
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f compose.test.yml down -v --remove-orphans
