[mypy]
python_version = 3.12
strict = True
warn_unused_ignores = True
warn_redundant_casts = True
disallow_untyped_defs = True
ignore_missing_imports = False

[mypy-tests.*]
disallow_untyped_defs = False

# Alembic ships no py.typed; env.py imports alembic.context / alembic.op
[mypy-alembic.*]
ignore_missing_imports = True

# asyncpg has no py.typed marker
[mypy-asyncpg.*]
ignore_missing_imports = True

# python-jose: stubs (types-python-jose) not installed in CI; the calls we
# make are narrow (decode, jwk.construct) and well-covered by runtime tests.
[mypy-jose.*]
ignore_missing_imports = True

# ldap3 ships no py.typed; AdGroupSync narrows the surface to a tiny shim.
[mypy-ldap3.*]
ignore_missing_imports = True

# intervaltree, apscheduler: third-party with no py.typed marker.
[mypy-intervaltree.*]
ignore_missing_imports = True

[mypy-apscheduler.*]
ignore_missing_imports = True
