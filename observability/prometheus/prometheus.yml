global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: flow-ingest
    static_configs:
      - targets: ["flow-ingest:9100"]

  - job_name: id-ingest
    static_configs:
      - targets: ["id-ingest:9100"]

  - job_name: correlator
    static_configs:
      - targets: ["correlator:9100"]
