# Production overlay.
#
# Layers on top of docker-compose.yml:
#   - Let's Encrypt HTTP-01 ACME on Traefik
#   - Resource limits + json-file log rotation on every service
#
# Docker secrets wiring for POSTGRES_PASSWORD / ENTRA_CLIENT_SECRET /
# AD_BIND_PASSWORD / SESSION_SECRET is stubbed below behind a `secrets` block;
# full `_FILE` env override plumbing (pydantic Settings validator that reads
# /run/secrets/<name>) is a P4-followup — services currently consume the same
# env vars as dev. Deployments that need it today should mount the secret
# files and override env vars inline in this file.
#
# Requires in .env:
#   ACME_EMAIL=ops@yourdomain.example
#
# Use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

volumes:
  traefik-certs:

x-logging: &logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  traefik:
    command:
      - --configFile=/etc/traefik/traefik.yml
      - --certificatesResolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesResolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesResolvers.letsencrypt.acme.httpChallenge.entryPoint=web
    volumes:
      - traefik-certs:/letsencrypt
    deploy:
      resources:
        limits: {cpus: "1.0", memory: 512M}
    logging: *logging

  postgres:
    deploy:
      resources:
        limits: {cpus: "4.0", memory: 4G}
        reservations: {cpus: "1.0", memory: 1G}
    logging: *logging

  redis:
    deploy:
      resources:
        limits: {cpus: "1.0", memory: 1G}
    logging: *logging

  api:
    labels:
      - traefik.http.routers.api.tls.certresolver=letsencrypt
    deploy:
      resources:
        limits: {cpus: "2.0", memory: 1G}
    logging: *logging

  flow-ingest:
    deploy:
      resources:
        limits: {cpus: "2.0", memory: 1G}
    logging: *logging

  id-ingest:
    deploy:
      resources:
        limits: {cpus: "1.0", memory: 512M}
    logging: *logging

  correlator:
    deploy:
      resources:
        limits: {cpus: "4.0", memory: 2G}
    logging: *logging

  backup:
    deploy:
      resources:
        limits: {cpus: "1.0", memory: 512M}
    logging: *logging
