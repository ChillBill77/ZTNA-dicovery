# Production overlay.
#
# Layers on top of docker-compose.yml:
#   - Let's Encrypt HTTP-01 ACME on Traefik
#   - Resource limits + json-file log rotation on every service
#   - Docker secrets mounted at /run/secrets/<name>; services read the file
#     body via pydantic Settings ``*_FILE`` env-var overrides (see
#     ``api/src/api/settings.py`` and ``id-ingest/src/id_ingest/settings.py``).
#
# Secrets are declared ``external: true`` so deployments create them out of
# band, e.g.:
#   echo -n "$pw" | docker secret create ad_bind_password -
#
# Requires in .env:
#   ACME_EMAIL=ops@yourdomain.example
#
# Use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

volumes:
  traefik-certs:

secrets:
  oidc_client_secret:
    external: true
  session_secret:
    external: true
  ad_bind_password:
    external: true
  entra_client_secret:
    external: true

x-logging: &logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  traefik:
    command:
      - --configFile=/etc/traefik/traefik.yml
      - --certificatesResolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesResolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesResolvers.letsencrypt.acme.httpChallenge.entryPoint=web
    volumes:
      - traefik-certs:/letsencrypt
    deploy:
      resources:
        limits: {cpus: "1.0", memory: 512M}
    logging: *logging

  postgres:
    deploy:
      resources:
        limits: {cpus: "4.0", memory: 4G}
        reservations: {cpus: "1.0", memory: 1G}
    logging: *logging

  redis:
    deploy:
      resources:
        limits: {cpus: "1.0", memory: 1G}
    logging: *logging

  api:
    labels:
      - traefik.http.routers.api.tls.certresolver=letsencrypt
    secrets:
      - oidc_client_secret
      - session_secret
    environment:
      OIDC_CLIENT_SECRET_FILE: /run/secrets/oidc_client_secret
      SESSION_SECRET_FILE: /run/secrets/session_secret
    deploy:
      resources:
        limits: {cpus: "2.0", memory: 1G}
    logging: *logging

  flow-ingest:
    deploy:
      resources:
        limits: {cpus: "2.0", memory: 1G}
    logging: *logging

  id-ingest:
    secrets:
      - ad_bind_password
      - entra_client_secret
    environment:
      AD_BIND_PASSWORD_FILE: /run/secrets/ad_bind_password
      ENTRA_CLIENT_SECRET_FILE: /run/secrets/entra_client_secret
    deploy:
      resources:
        limits: {cpus: "1.0", memory: 512M}
    logging: *logging

  correlator:
    deploy:
      resources:
        limits: {cpus: "4.0", memory: 2G}
    logging: *logging

  backup:
    deploy:
      resources:
        limits: {cpus: "1.0", memory: 512M}
    logging: *logging
